<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donation Form</title>
</head>
<body>
  <h1>Donation Form</h1>
  <form>
    
    
    <label for="fullname">Full Name:<input id="fullname" type="text" name="name" required></label>

   <label for="emailaddress">Email Address:
    <input id="emailaddress" type="email" name="email" required></label>

    
   <label for="donationAmount">Donation Amount ($):<input id="donationAmount" type="number" name="amount" required></label>

    <label for="subscribe">Subscribe<input id="subscribe" type="checkbox" name="newsletter"></label>
  

  <input type="submit" value="Send">
  </form>
</body>
</html>
